type ContractPaused @entity(immutable: true) {
  id: Bytes!
  by: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type ContractUnpaused @entity(immutable: true) {
  id: Bytes!
  by: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type GamePlayed @entity(immutable: true) {
  id: Bytes!
  sequentialId: BigInt! # Index séquentiel : 1, 2, 3, 4, ... 500000
  player: Bytes! # address
  seasonId: BigInt! # uint256
  clicks: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type GameStarted @entity(immutable: true) {
  id: Bytes!
  player: Bytes! # address
  seasonId: BigInt! # uint256
  sessionEndsAt: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type ItemBought @entity(immutable: true) {
  id: Bytes!
  player: Bytes! # address
  slot: Int! # uint8
  level: Int! # uint8
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type OwnershipTransferred @entity(immutable: true) {
  id: Bytes!
  previousOwner: Bytes! # address
  newOwner: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type PlayerAdded @entity(immutable: true) {
  id: Bytes!
  player: Bytes! # address
  seasonId: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type PointsClaimed @entity(immutable: true) {
  id: Bytes!
  player: Bytes! # address
  amount: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type SeasonStarted @entity(immutable: true) {
  id: Bytes!
  seasonId: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

# Entité pour stocker les statistiques globales
type GlobalStats @entity(immutable: false) {
  id: String! # Utilisera "global" comme ID unique
  totalGamesStarted: BigInt! # Nombre total de parties lancées
  totalGamesPlayed: BigInt! # Nombre total d'événements GamePlayed
  totalPointsClaimed: BigInt! # Somme totale des points réclamés
  totalPlayers: BigInt! # Nombre total de joueurs uniques
  totalItemsBought: BigInt! # Nombre total d'objets achetés
  lastUpdatedBlock: BigInt! # Dernier block où les stats ont été mises à jour
  lastUpdatedTimestamp: BigInt! # Dernier timestamp de mise à jour
}

# Entité optionnelle pour stocker des statistiques par saison
type SeasonStats @entity(immutable: false) {
  id: String! # seasonId comme string
  seasonId: BigInt!
  gamesStarted: BigInt!
  pointsClaimed: BigInt!
  playersCount: BigInt!
  itemsBought: BigInt!
  lastUpdatedBlock: BigInt!
  lastUpdatedTimestamp: BigInt!
}