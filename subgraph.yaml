specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: digitrabbits
    network: megaeth-testnet
    source:
      address: "0x07bc9814b3f806a5fa95dc5530407ad4d599e3dd"
      abi: digitrabbits
      startBlock: 13040920
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ContractPaused
        - ContractUnpaused
        - GamePlayed
        - GameStarted
        - ItemBought
        - OwnershipTransferred
        - PlayerAdded
        - PointsClaimed
        - SeasonStarted
      abis:
        - name: digitrabbits
          file: ./abis/digitrabbits.json
      eventHandlers:
        - event: ContractPaused(indexed address)
          handler: handleContractPaused
        - event: ContractUnpaused(indexed address)
          handler: handleContractUnpaused
        - event: GamePlayed(indexed address,uint256,uint256)
          handler: handleGamePlayed
        - event: GameStarted(indexed address,uint256,uint256)
          handler: handleGameStarted
        - event: ItemBought(indexed address,uint8,uint8)
          handler: handleItemBought
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: PlayerAdded(indexed address,uint256)
          handler: handlePlayerAdded
        - event: PointsClaimed(indexed address,uint256)
          handler: handlePointsClaimed
        - event: SeasonStarted(indexed uint256)
          handler: handleSeasonStarted
      file: ./src/digitrabbits.ts
